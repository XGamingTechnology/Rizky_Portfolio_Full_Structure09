server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ✅ Security Headers dengan CSP yang izinkan Tailwind CDN
    add_header Content-Security-Policy "default-src 'self' https: http:; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-src 'self' https://www.youtube.com;" always;
    
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|pdf|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}